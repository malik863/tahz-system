

{% block content %}
<div class="container" style="max-width: 600px; margin: 40px auto; background: white; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px;">
    <h2 style="margin-bottom: 20px; color: #333;">{{ title }}</h2>
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: #de350b; font-size: 13px; margin-top: 5px;">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}

        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button type="submit" class="btn" style="background-color: #2b5797; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Save Halaqa</button>
            <a href="{% url 'halaqat:halaqa_list' %}" style="background-color: #e1e4e8; color: #333; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: 500;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
