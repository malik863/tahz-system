<!DOCTYPE html>
<html>
<head>
    <title>Admin Hub</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f6f9; }
        .hub-card { max-width: 800px; margin: auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 10 rgba(0,0,0,0.08); }
        .badge { background: #28a745; color: white; padding: 5px 10px; border-radius: 20px; font-size: 14px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .menu-item { background: #f8f9fa; padding: 20px; border-radius: 8px; text-decoration: none; color: #333; border: 1px solid #dee2e6; text-align: center; font-weight: bold; transition: all 0.2s; }
        .menu-item:hover { background: #007bff; color: white; transform: translateY(-2px); }
        .logout-btn { background: #dc3545; color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; float: right; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="hub-card">
        <a href="{% url 'accounts:logout' %}" class="logout-btn">Sign Out →</a>
        <h2>Tahfiz Hub System Portal</h2>
        <p>Logged in security session as: <strong>{{ request.user.username }}</strong> <span class="badge">{{ role }}</span></p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

        <h3>System Core Management Options</h3>
        <div class="menu-grid">
            <a href="{% url 'accounts:teacher_list' %}" class="menu-item">
                <div style="font-size: 28px; margin-bottom: 5px;">👨‍🏫</div>
                Manage Teachers (CRUD)
            </a>
        <a href="{% url 'students:student_list' %}" class="menu-item">
            <div style="font-size: 28px; margin-bottom: 5px;">🧑‍🎓</div>
            Manage Students
        </a>
        <a href="{% url 'halaqat:halaqa_list' %}" class="menu-item" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; position: relative; z-index: 10; cursor: pointer;">
            <div style="font-size: 28px; margin-bottom: 5px; pointer-events: none;">🕌</div>
            <span style="font-weight: bold; pointer-events: none;">Halaqa Management</span>
            <small style="font-size: 11px; margin-top: 4px; color: #555; pointer-events: none;">Active (Day 10)</small>
        </a>
        </div>
    </div>
</body>
</html>
